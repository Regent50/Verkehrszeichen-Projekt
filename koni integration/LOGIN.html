<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamische Website</title>
    <style>
        /* Stil für den Abstand zwischen den Elementen */
        #guest-login {
            margin-top: 20px; /* Hier wird der Abstand zum Login-Formular eingestellt */
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        #guest-login:hover {
            background-color: #45a049; /* Farbe bei Hover */
        }
    </style>
</head>
<body>
    <div id="login-page">
        <h2>LOGIN</h2>
        <form method="POST" action="/">
            <input type="text" name="username" id="username" placeholder="Benutzername" required autocomplete="username">
            <input type="password" name="password" id="password" placeholder="Passwort" required autocomplete="current-password">
            <button type="submit">Login</button>
        </form>

        <!-- Guest Button -->
        <button id="guest-login" onclick="loginAsGuest()">Als Gast anmelden</button>
    </div>

    {% if error %}
    <script>
        alert("Falscher Benutzername oder Passwort");
    </script>
    {% endif %}

    <script>
        function loginAsGuest() {
            // Hier können wir ein Formular absenden oder den Benutzer auf eine andere Seite weiterleiten.
            alert("Du bist nun als Gast eingeloggt!");
            // Beispiel: Weiterleitung zu einer anderen Seite
            window.location.href = "/guest";  // Beispiel für die Weiterleitung zu einer Gästeseite
        }
    </script>
</body>
</html>
