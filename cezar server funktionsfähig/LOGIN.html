<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        /* Stil für die gesamte Seite */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        #login-page {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Stil für die Eingabefelder */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        /* Stil für den Login-Button */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #001f3f;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button[type="submit"]:hover {
            background-color: #001f3f;
        }

        /* Stil für den Gast-Button */
        #guest-login {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #001f3f;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            width: 100%;
        }

        #guest-login:hover {
            background-color: #001f3f;
        }

        /* Stil für Fehlermeldungen */
        .error-message {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div id="login-page">
        <h2>LOGIN</h2>
        <form method="POST" action="/">
            <input type="text" name="username" id="username" placeholder="Benutzername" required autocomplete="username">
            <input type="password" name="password" id="password" placeholder="Passwort" required autocomplete="current-password">
            <button type="submit">Login</button>
        </form>

        <!-- Guest Button -->
        <button id="guest-login" onclick="loginAsGuest()">Als Gast anmelden</button>

        <!-- Fehlermeldung -->
        {% if error %}
        <div class="error-message">
            Falscher Benutzername oder Passwort
        </div>
        {% endif %}
    </div>

    <script>
        function loginAsGuest() {
            // Hier können wir ein Formular absenden oder den Benutzer auf eine andere Seite weiterleiten.
            alert("Du bist nun als Gast eingeloggt!");
            // Beispiel: Weiterleitung zu einer anderen Seite
            window.location.href = "/guest";  // Beispiel für die Weiterleitung zu einer Gästeseite
        }
    </script>
</body>
</html>
