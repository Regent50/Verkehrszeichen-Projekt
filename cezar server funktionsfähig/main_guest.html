<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamische Website GUEST</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
            user-select: none;
            color: white;
        }
        .bar {
            background-color: #001f3f; /* Dunkelblau */
            color: white;
            padding: 20px; /* Padding von 20px für die obere Leiste */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px; /* Schriftgröße anpassen */
            font-weight: bold;
            letter-spacing: 2px;
            flex-direction: column;
        }
        .menu-button {
            position: absolute;
            left: 20px; /* Button mehr nach links verschoben */
            top: 50%; /* Button vertikal mittig auf der oberen Leiste */
            transform: translateY(-50%); /* Damit der Button genau mittig ist */
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #001f3f;
            border: 2px solid #001f3f;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .menu-button:hover {
            background-color: #005288;
            border-color: #005288;
        }
        .dropdown-menu {
            display: block;
            position: absolute;
            top: 60px;
            left: 10px;
            background-color: #003366;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.3s ease;
            width: 155px;
        }
        .dropdown-menu.open {
            max-height: 300px;
            opacity: 1;
        }
        .dropdown-menu button {
            width: 100%;
            padding: 8px 10px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            outline: none;
            font-size: 16px;
            color: white;
        }
        .dropdown-menu button:hover {
            background-color: #005288;
        }
        .content {
            padding: 10px;
            flex-grow: 1;
            min-height: 800px;
        }
        .bottom-bar {
            background-color: #001f3f; /* Dunkelblau */
            color: white;
            padding: 20px; /* Padding für die untere Leiste auf 20px reduziert */
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="bar">
        <button class="menu-button">☰</button>
        <h1 style="margin: 0; font-size: 30px;">Dynamisches Verkehrszeichen</h1>
        <div class="dropdown-menu">
            <button onclick="window.location.href='/verkehrszeichen'">Verkehrszeichen</button>
        </div>
    </div>
    <div class="content"></div>
    <div class="bottom-bar">
        &copy; 2025 Konrad Solecki | Cezar-Andrei Iosif-Petrescu | David Jovanovic
    </div>
    <script>
        const ws = new WebSocket('ws://localhost:5000/ws');
        ws.onmessage = function(event) {
            const data = event.data;
            console.log("Empfangene Nachricht:", data);
        };
        ws.onopen = function() {
            console.log("WebSocket-Verbindung hergestellt");
        };
        ws.onerror = function(error) {
            console.error("WebSocket-Fehler:", error);
        };
        ws.onclose = function() {
            console.log("WebSocket-Verbindung geschlossen");
        };
        document.querySelector(".menu-button").addEventListener("click", function () {
            let menu = document.querySelector(".dropdown-menu");
            menu.classList.toggle("open");
        });
        document.addEventListener("click", function(event) {
            let menu = document.querySelector(".dropdown-menu");
            if (!event.target.closest(".menu-button") && !event.target.closest(".dropdown-menu")) {
                menu.classList.remove("open");
            }
        });
    </script>
</body>
</html>
