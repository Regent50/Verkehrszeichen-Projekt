<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: darkblue;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: gray;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background-color: white;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #45a049;
        }

        .main-container {
            text-align: center;
            margin-top: 50px;
            display: none;
        }

        .button-container {
            display: inline-block;
            border: 2px solid white;
            padding: 20px;
            border-radius: 10px;
        }

        .button-container button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button-container button:hover {
            background-color: #45a049;
        }

        #output {
            margin-top: 20px;
            font-size: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <form onsubmit="return validateLogin(event)">
                <input type="text" id="username" placeholder="Benutzername" required>
                <input type="password" id="password" placeholder="Passwort" required>
                <button type="submit">Anmelden</button>
            </form>
        </div>
    </div>

    <div id="mainScreen" class="main-container">
        <div class="button-container">
            <button onclick="showMessage('Wetter')">Wetter</button>
            <button onclick="showMessage('Verkehr')">Verkehr</button>
            <button onclick="showMessage('Einstellungen')">Einstellungen</button>
            <button onclick="showMessage('Home')">Home</button>
        </div>
        <div id="output"></div>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault();
            if (document.getElementById('username').value === "123" && document.getElementById('password').value === "123") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('mainScreen').style.display = "block";
            } else {
                alert("Falscher Benutzername oder Passwort!");
            }
        }

        function showMessage(page) {
            document.getElementById('output').innerText = "zurzeit garnix bruda";
        }
    </script>
</body>
</html>
