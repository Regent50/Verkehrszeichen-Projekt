<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main – Verkehrszeichen Control</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>

    <style>
        /* =========================================================
           GLOBAL / RESET
           ========================================================= */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Verdana, sans-serif;
        }

        /* =========================================================
           HAUPT-LAYOUT
           ========================================================= */
        .background {
            display: flex;
            height: 100%;
            background-color: #f5f5f5;
        }

        /* =========================================================
           SIDEBAR (LINKS)
           ========================================================= */
        .sidebar {
            width: 200px;
            border-right: 4px solid black;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;

            background-image:
                radial-gradient(#040000 1px, transparent 1px),
                linear-gradient(to top, yellow, red);
            background-size: 12px 12px, 100% 100%;
            background-repeat: repeat, no-repeat;
            z-index: 1000;
            box-sizing: border-box;
        }

        .sidebar > button,
        .sidebar-footer button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: 3px solid black;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .sidebar > button:hover,
        .sidebar-footer button:hover {
            background-color: #f0f0f0;
        }

        /* =========================================================
           SIDEBAR-DROPDOWN-PANELS
           ========================================================= */
        .panel {
            width: 90%;
            margin: 0 auto 12px auto;
            background: white;
            border: 3px solid black;
            border-radius: 14px;
            padding: 0 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            box-sizing: border-box;
        }

        .panel.open {
            max-height: 300px;
            padding: 10px;
        }

        .panel button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 2px solid black;
            background: #fafafa;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .panel button:hover {
            background-color: #e0e0e0;
        }

        /* =========================================================
           SIDEBAR – SENSOR BEREICH
           ========================================================= */
        .sidebar-sensors {
            margin-top: 10px;
            padding-top: 12px;
            border-top: 4px solid black;
        }

        .sidebar-sensors-title {
            width: 100%;
            margin: 0 0 10px 0;
            padding: 8px 10px;
            background: white;
            border: 3px solid black;
            border-radius: 14px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
        }

        .sidebar-sensors .sensor-bar {
            height: auto;
            border: 3px solid black;
            border-radius: 14px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .sidebar-sensors .sensor-box {
            width: 100%;
            height: auto;
            min-height: 55px;
            border: 2px solid red;
            border-radius: 14px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 12px;
            box-sizing: border-box;
        }

        .sidebar-sensors .sensor-title {
            font-size: 13px;
            color: #555;
        }

        .sidebar-sensors .sensor-value {
            font-size: 18px;
            font-weight: bold;
        }

        /* =========================================================
           SIDEBAR – UNTERER BEREICH
           ========================================================= */
        .sidebar-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
        }

        /* =========================================================
           CONTENT-BEREICH
           ========================================================= */
        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* =========================================================
           RESPONSIVE GRID
           ========================================================= */
        .main-panels {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 30px;
            flex: 1;
            min-height: 0;
        }

        /* =========================================================
           ANZEIGE (VERKEHRSZEICHEN) & KARTE
           ========================================================= */
        .anzeige-box,
        .karte-box {
            border: 4px solid black;
            border-radius: 18px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .anzeige-box {
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        #signText {
            font-size: 24px;
            font-weight: bold;
            color: black;
            margin-bottom: 20px;
            z-index: 2;
            background: rgba(255,255,255,0.8);
            padding: 8px 16px;
            border-radius: 10px;
        }

      #signImage { 
    display: none; 
    max-width: 80vw;
    max-height: 80vh;
    width: auto;
    height: auto;
    object-fit: contain;
}

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* =========================================================
           MEDIA QUERIES
           ========================================================= */
        @media (max-width: 1200px) {
            .main-panels {
                grid-template-columns: 1fr;
                grid-template-rows: 400px 400px;
            }
        }
    </style>
</head>
<body>

<div class="background">
    <div class="sidebar">

        <button onmouseenter="togglePanel('kontrolle')">Kontrolle</button>
        <div class="panel" id="kontrolle">
            <button onclick="updateSign('STOP')">STOP</button>
            <button onclick="updateSign('Geschwindigkeit 30')">30 km/h</button>
            <button onclick="updateSign('Geschwindigkeit 50')">50 km/h</button>
            <button onclick="updateSign('Achtung Baustelle')">Baustelle</button>
            <button onclick="updateSign('Freie Fahrt')">Freie Fahrt</button>
        </div>

        <button onmouseenter="togglePanel('zeichen')">Verkehrszeichen</button>
        <div class="panel" id="zeichen">
            <button onclick="window.location.href='/verkehrszeichen'">VZ Preview</button>
            <button onclick="window.location.href='/verkehrszeichen1'">VZ Live</button>
        </div>

        <div class="sidebar-sensors">
            <div class="sidebar-sensors-title">Sensor Daten</div>

            <div class="sensor-bar">
                <div class="sensor-box">
                    <div class="sensor-title">Temperatur</div>
                    <div class="sensor-value">-13°C</div>
                </div>
                <div class="sensor-box">
                    <div class="sensor-title">Helligkeit</div>
                    <div class="sensor-value">57%</div>
                </div>
                <div class="sensor-box">
                    <div class="sensor-title">Status</div>
                    <div class="sensor-value">Aktiv</div>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button onclick="console.log('Placeholder klick')">Placeholder</button>
            <div class="sidebar-bottom">
                <button onclick="alert('Zurück zum Login')">Zurück zu Login</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="main-panels">
            <div class="anzeige-box">
                <div id="signText">Warte auf Signal...</div>
                <img id="signImage" src="" alt="VZ">
            </div>
            <div class="karte-box">
                <div id="map"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ================= SIDEBAR LOGIK =================
    let activePanel = null;

    function togglePanel(panelId) {
        const panel = document.getElementById(panelId);
        if (activePanel === panel) return;
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("open"));
        panel.classList.add("open");
        activePanel = panel;
    }

    // ================= FUNKTION ZUM SENDEN DER STEUERUNG =================
    function updateSign(sign) {
        fetch("/update", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "sign=" + sign
        }).then(response => {
            if (response.ok) {
                console.log("Befehl gesendet: ", sign);
            } else {
                console.error("Fehler beim Senden des Befehls");
            }
        }).catch(error => {
            console.error("Fetch Fehler:", error);
        });
    }

    // ================= MAP SETUP =================
    var map = L.map('map').setView([52.52, 13.40], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // ================= GEOLOCATION LOGIK (aus zweitem Code beibehalten) =================
    map.locate({ setView: true, maxZoom: 16 });

    function onLocationFound(e) {
        var radius = e.accuracy / 2;
        L.marker(e.latlng).addTo(map)
            .bindPopup("Du bist hier (Genauigkeit: " + radius.toFixed(0) + "m)").openPopup();
        L.circle(e.latlng, radius).addTo(map);
    }

    function onLocationError(e) {
        console.log("Standort konnte nicht ermittelt werden: " + e.message);
    }

    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);

    // ================= MAP RESIZE FIX =================
    setTimeout(function(){ map.invalidateSize(); }, 200);
    window.addEventListener("resize", function () {
        map.invalidateSize();
    });

    // ================= SOCKET.IO LOGIK =================
    var socket = io();

    socket.on("update_sign", function(data) {
        console.log("Neues Verkehrszeichen empfangen:", data.sign);

        var textDisplay = document.getElementById("signText");
        var imageDisplay = document.getElementById("signImage");

        textDisplay.innerText = data.sign || "Kein Verkehrszeichen";

        var signImages = {
            "STOP": "/static/signs/stop_schild.png",
            "Geschwindigkeit 30": "/static/signs/schild_30.png",
            "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
            "Achtung Baustelle": "/static/signs/baustelle_schild.png",
            "Freie Fahrt": "/static/signs/freifahrt_schild.png"
        };

        if (data.sign && signImages[data.sign]) {
            imageDisplay.src = signImages[data.sign];
            imageDisplay.style.display = "block";
        } else {
            imageDisplay.style.display = "none";
            imageDisplay.src = "";
        }
    });
</script>
</body>
</html>
