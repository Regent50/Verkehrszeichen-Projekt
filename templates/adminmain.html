<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main – Verkehrszeichen Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
        html, body { height: 100%; margin: 0; font-family: Verdana, sans-serif; }
        .background { display: flex; height: 100%; background-color: #f5f5f5; }
        .sidebar { width: 200px; border-right: 4px solid black; padding: 20px 10px; display: flex; flex-direction: column; background-image: radial-gradient(#040000 1px, transparent 1px), linear-gradient(to top, yellow, red); background-size: 12px 12px, 100% 100%; z-index: 1000; }
        .sidebar > button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 14px; border: 3px solid black; background: white; cursor: pointer; font-weight: bold; }
        .panel { width: 90%; margin: 0 auto 12px auto; background: white; border: 3px solid black; border-radius: 14px; padding: 0 10px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .panel.open { max-height: 400px; padding: 10px; }
        .panel button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 2px solid black; background: #fafafa; cursor: pointer; font-weight: bold; }
        .content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 30px; overflow-y: auto; }
        
        /* FIX: GRID FÜR WINDOW-RESIZE */
        .main-panels { display: grid; grid-template-columns: 1fr 1.6fr; gap: 30px; flex: 1; min-height: 0; }
        
        .anzeige-box, .karte-box { border: 4px solid black; border-radius: 18px; background: white; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .anzeige-box { flex-direction: column; padding: 20px; }
        #signText { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        #signImage { display: none; max-width: 80%; max-height: 250px; }
        #map { width: 100%; height: 100%; }

        /* RESPONSIVE DESIGN FIX */
        @media (max-width: 1200px) {
            .main-panels {
                grid-template-columns: 1fr;
                grid-template-rows: 400px 400px;
            }
        }
    </style>
</head>
<body>

<div class="background">
    <div class="sidebar">
        <button onmouseenter="togglePanel('kontrolle')">Kontrolle</button>
        <div class="panel" id="kontrolle">
            <button onclick="updateSign('STOP')">STOP</button>
            <button onclick="updateSign('Geschwindigkeit 30')">30 km/h</button> 
            <button onclick="updateSign('Geschwindigkeit 50')">50 km/h</button>
            <button onclick="updateSign('Achtung Baustelle')">Baustelle</button>
            <button onclick="updateSign('Freie Fahrt')">Freie Fahrt</button>
        </div>
        
        <button onmouseenter="togglePanel('zeichen')">Verkehrszeichen</button>
        <div class="panel" id="zeichen">
            <button onclick="window.location.href='/verkehrszeichen'">VZ Preview</button>
            <button onclick="window.location.href='/verkehrszeichen1'">VZ Live</button>
        </div>
    </div>

    <div class="content">
        <div class="main-panels">
            <div class="anzeige-box">
                <div id="signText">Warte auf Signal...</div>
                <img id="signImage" src="" alt="VZ">
            </div>
            <div class="karte-box"><div id="map"></div></div>
        </div>
    </div>
</div>

<script>
    function togglePanel(panelId) {
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("open"));
        document.getElementById(panelId).classList.add("open");
    }

    function updateSign(sign) {
        fetch("/update", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "sign=" + sign
        });
    }

    // MAP SETUP
    var map = L.map('map').setView([52.52, 13.40], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // FIX: MAP RESIZE LOGIK
    setTimeout(function(){ map.invalidateSize(); }, 200);
    window.addEventListener("resize", function () {
        map.invalidateSize();
    });

    var socket = io();
    socket.on("update_sign", function(data) {
        document.getElementById("signText").innerText = data.sign;
        const img = document.getElementById("signImage");
        const signs = { 
            "STOP": "/static/signs/stop_schild.png", 
            "Geschwindigkeit 30": "/static/signs/schild_30.png", 
            "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
            "Achtung Baustelle": "/static/signs/baustelle_schild.png",
            "Freie Fahrt": "/static/signs/freifahrt_schild.png"
        };
        if (signs[data.sign]) {
            img.src = signs[data.sign];
            img.style.display = "block";
        }
    });
</script>
</body>
</html>
