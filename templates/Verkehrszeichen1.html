<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Anzeige – Verkehrszeichen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    /* 1. Reset: Verhindert jegliches Scrollen oder Ränder */
    * { box-sizing: border-box; }
    html, body { 
        height: 100%; 
        width: 100%;
        margin: 0; 
        padding: 0; 
        background-color: #000; 
        overflow: hidden; 
    }

    /* 2. Container: Nimmt immer exakt den ganzen Bildschirm ein */
    .anzeige { 
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        background: #fff; 
        position: relative; 
    }

    /* 3. Status-Bar: Fixiert oben, damit sie keinen Platz wegnimmt */
    .status-bar { 
        position: absolute; 
        top: 10px; 
        left: 2%;
        width: 96%; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        z-index: 10; 
        pointer-events: none; 
    }

    #clock { 
        font-family: 'UnifrakturMaguntia', serif; 
        font-size: clamp(14px, 4vh, 30px); /* Skaliert mit der Bildschirmhöhe */
        color: #000; 
    }

    #statusText { 
        font-family: sans-serif; 
        font-size: 10px; 
        font-weight: bold; 
    }

    /* 4. Content-Area: Füllt das gesamte Fenster */
    .content-area { 
        flex-grow: 1;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 5vh; /* 5% Abstand vom Rand für Ästhetik */
    }

    /* 5. Das Bild: "contain" sorgt dafür, dass es nie abgeschnitten wird */
    #signImage { 
        display: none; 
        width: 100%;
        height: 100%;
        object-fit: contain; /* Wichtig: Bild wird skaliert, behält aber Proportionen */
    }

    .animate-fade { animation: smoothFade 0.4s ease-out; }
    @keyframes smoothFade { 0% { opacity: 0; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="anzeige">
    <div class="status-bar">
        <div id="statusText" style="color: red;">OFFLINE</div>
        <div id="clock">00:00:00</div>
    </div>
    <div class="content-area">
        <img id="signImage" src="" alt="Schild" />
    </div>
  </div>
  
  <script>
    // Uhrzeit-Logik
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE'); }
    setInterval(updateClock, 1000); 
    updateClock();

    // Socket.IO Logik
    const socket = io({ transports: ["websocket"] }); // Stabiler über ngrok
    const imageDisplay = document.getElementById("signImage");

    socket.on("connect", () => { 
        document.getElementById("statusText").innerText = "ONLINE"; 
        document.getElementById("statusText").style.color = "#00c851"; 
    });

    socket.on("disconnect", () => { 
        document.getElementById("statusText").innerText = "OFFLINE"; 
        document.getElementById("statusText").style.color = "red"; 
    });

    socket.on("update_sign", function (data) {
      const signImages = {
        "STOP": "/static/signs/stop_schild.png",
        "Geschwindigkeit 30": "/static/signs/schild_30.png",
        "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
        "Achtung Baustelle": "/static/signs/baustelle_schild.png",
        "Freie Fahrt": "/static/signs/freifahrt_schild.png"
      };

      if (data.sign && signImages[data.sign]) {
        imageDisplay.classList.remove("animate-fade");
        imageDisplay.src = signImages[data.sign];
        imageDisplay.style.display = "block";
        // Kurzer Delay für die Animation
        setTimeout(() => { imageDisplay.classList.add("animate-fade"); }, 10);
      } else { 
        imageDisplay.style.display = "none"; 
      }
    });
  </script>
</body>
</html>
