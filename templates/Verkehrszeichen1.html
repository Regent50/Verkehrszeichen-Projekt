<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anzeige – Verkehrszeichen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    .anzeige { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; }
    .status-bar { position: absolute; top: 8px; width: 96%; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; pointer-events: none; }
    #clock { font-family: 'UnifrakturMaguntia', serif; font-size: clamp(16px, 3vw, 26px); color: #000; letter-spacing: 1px; }
    #statusText { font-family: sans-serif; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .content-area { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding-top: 35px; box-sizing: border-box; }
    #signImage { display: none; max-width: 98%; max-height: 90%; width: auto; height: auto; object-fit: contain; }
    .animate-fade { animation: smoothFade 0.6s ease-out; }
    @keyframes smoothFade { 0% { opacity: 0; transform: scale(0.97); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="anzeige">
    <div class="status-bar">
        <div id="statusText" style="color: red;">OFFLINE</div>
        <div id="clock">00:00:00</div>
    </div>
    <div class="content-area"><img id="signImage" src="" alt="Schild" /></div>
  </div>
  <script>
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE'); }
    setInterval(updateClock, 1000); updateClock();
    const socket = io();
    const imageDisplay = document.getElementById("signImage");
    socket.on("connect", () => { document.getElementById("statusText").innerText = "ONLINE"; document.getElementById("statusText").style.color = "#00c851"; });
    socket.on("disconnect", () => { document.getElementById("statusText").innerText = "OFFLINE"; document.getElementById("statusText").style.color = "red"; });
    socket.on("update_sign", function (data) {
      const signImages = {
        "STOP": "/static/signs/stop_schild.png",
        "Geschwindigkeit 30": "/static/signs/schild_30.png",
        "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
        "Achtung Baustelle": "/static/signs/baustelle_schild.png",
        "Freie Fahrt": "/static/signs/freifahrt_schild.png"
      };
      if (data.sign && signImages[data.sign]) {
        imageDisplay.classList.remove("animate-fade");
        imageDisplay.style.display = "none";
        imageDisplay.src = signImages[data.sign];
        setTimeout(() => { imageDisplay.style.display = "block"; imageDisplay.classList.add("animate-fade"); }, 30);
      } else { imageDisplay.style.display = "none"; }
    });
  </script>
</body>
</html>
