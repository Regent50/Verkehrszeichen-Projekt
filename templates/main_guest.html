<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamische Website GUEST</title>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            text-align: center;
            user-select: none;
            color: white;
        }
        .bar {
            background-color: #001f3f;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-direction: column;
            position: relative;
        }
        .menu-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: #001f3f;
            border: 2px solid #001f3f;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .menu-button:hover {
            background-color: #005288;
            border-color: #005288;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 60px;
            left: 60px;
            background-color: #003366;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            width: 155px;
            z-index: 1000;
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-menu button {
            width: 100%;
            padding: 10px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }
        .dropdown-menu button:hover {
            background-color: #005288;
        }
        .map-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        .bottom-bar {
            background-color: #001f3f;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="bar">
        <button class="menu-button">☰</button>
        <h1 style="margin: 0; font-size: 30px;">Dynamisches Verkehrszeichen</h1>
        <div class="dropdown-menu">
            <button onclick="window.location.href='/guestv'">Verkehrszeichen</button>
        </div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <div class="bottom-bar">
        &copy; 2025 Konrad Solecki | Cezar-Andrei Iosif-Petrescu | David Jovanovic
    </div>
   
    <script>
        document.querySelector(".menu-button").addEventListener("click", function () {
            let menu = document.querySelector(".dropdown-menu");
            menu.classList.toggle("open");
        });
        document.addEventListener("click", function(event) {
            let menu = document.querySelector(".dropdown-menu");
            if (!event.target.closest(".menu-button") && !event.target.closest(".dropdown-menu")) {
                menu.classList.remove("open");
            }
        });
    </script>
   
    <script>
        var map = L.map('map').setView([52.5200, 13.4050], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        function showLocation(position) {
            var userLat = position.coords.latitude;
            var userLon = position.coords.longitude;
            L.marker([userLat, userLon]).addTo(map)
                .bindPopup("<b>Du bist hier!</b>").openPopup();
            map.setView([userLat, userLon], 14);
        }
        function handleLocationError(error) {
            console.error("Fehler beim Abrufen des Standorts: ", error);
        }
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showLocation, handleLocationError);
        } else {
            console.log("Geolocation wird nicht unterstützt");
        }
    </script>
</body>
</html>
