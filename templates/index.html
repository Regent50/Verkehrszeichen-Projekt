<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkehrszeichen</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        img { width: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Aktuelles Verkehrszeichen</h1>
    <img id="sign" src="{{ sign }}.png" alt="Verkehrszeichen">
    
    <script>
        function updateSign() {
            fetch("/")
            .then(response => response.text())
            .then(html => {
                document.body.innerHTML = html;
            });
        }
        setInterval(updateSign, 2000);
    </script>
</body>
</html>
