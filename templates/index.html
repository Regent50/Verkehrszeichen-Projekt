<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkehrszeichen</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <h1>Aktuelles Verkehrszeichen: <span id="sign">Unklar</span></h1>
    
    <script type="text/javascript">
        // WebSocket-Verbindung herstellen
        var socket = io();

        // Nachricht vom Server empfangen und das Verkehrszeichen aktualisieren
        socket.on('update_sign', function(data) {
            document.getElementById('sign').textContent = data.sign;
        });
    </script>
</body>
</html>
