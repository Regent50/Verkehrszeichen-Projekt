<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkehrszeichen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
            user-select: none;
            color: white;
        }
        .bar {
            background-color: #001f3f;
            color: white;
            padding: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-direction: column;
        }
        .main-button {
            position: absolute;
            left: 20px; /* Button mehr nach links verschoben */
            top: 50%; /* Button vertikal mittig auf der oberen Leiste */
            transform: translateY(-50%); /* Damit der Button genau mittig ist */
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #001f3f;
            border: 2px solid #001f3f;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .main-button:hover {
            background-color: #005288;
            border-color: #005288;
        }
        .content {
            padding: 10px;
            flex-grow: 1;
            min-height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .bottom-bar {
            background-color: #001f3f;
            color: white;
            padding: 20px; /* Reduzierte Höhe */
            text-align: center;
        }
        #signText {
            color: black;
        }
        #signImage {
            display: none;
            width: 200px;
            height: auto;
            margin-top: 20px;
        }
    </style>
    <script>
        var socket = io();

        socket.on("update_sign", function(data) {
            console.log("Neues Verkehrszeichen:", data.sign);
            var textDisplay = document.getElementById("signText");
            var imageDisplay = document.getElementById("signImage");

            textDisplay.innerText = data.sign;

            var signImages = {
                "STOP": "/static/signs/stop_schild.png",
                "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
                "Achtung Baustelle": "/static/signs/baustelle_schild.png",
                "Freie Fahrt": "/static/signs/freifahrt_schild.png"
            };

            if (signImages[data.sign]) {
                imageDisplay.src = signImages[data.sign];
                imageDisplay.style.display = "block";
            } else {
                imageDisplay.style.display = "none";
            }
        });
    </script>
</head>
<body>
    <div class="bar">
        <button class="main-button" onclick="window.location.href='/main'">MAIN</button>
        <h1 style="margin: 0; font-size: 24px;">Verkehrszeichen</h1>
    </div>
   
    <div class="content">
        <div id="signText">Kein Verkehrszeichen</div>
        <img id="signImage" src="" alt="Verkehrszeichen">
    </div>
    <div class="bottom-bar">
        &copy; 2025 Konrad Solecki | Cezar-Andrei Iosif-Petrescu | David Jovanovic
    </div>
</body>
</html>
