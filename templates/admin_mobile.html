<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin – Mobile</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_mobile.css') }}">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
</head>
<body>
<div class="app">
    <div class="card view-badge">Admin Mobile Ansicht</div>

    <div id="ui-message"></div>

    <div class="card">
        <div class="title">Verkehrszeichen</div>
        <div class="sign-box">
            <div id="signText">Warte auf Signal...</div>
            <img id="signImage" src="" alt="Verkehrszeichen">
        </div>
    </div>

    <div class="card map-card">
        <div class="title">Karte</div>
        <div id="map"></div>
    </div>

    <div class="card">
        <div class="title">Kontrolle</div>
        <div class="button-grid" id="sign-buttons">
            <button data-sign="STOP" onclick="updateSign('STOP')">STOP</button>
            <button data-sign="Geschwindigkeit 30" onclick="updateSign('Geschwindigkeit 30')">30 km/h</button>
            <button data-sign="Geschwindigkeit 50" onclick="updateSign('Geschwindigkeit 50')">50 km/h</button>
            <button data-sign="Achtung Baustelle" onclick="updateSign('Achtung Baustelle')">Baustelle</button>
            <button data-sign="Freie Fahrt" onclick="updateSign('Freie Fahrt')">Freie Fahrt</button>
        </div>
    </div>

    <div class="card">
        <div class="title">Sensor Daten</div>
        <div class="sensor-list">
            <div class="sensor-box">
                <div class="sensor-title">Helligkeit (UV)</div>
                <div class="sensor-value" id="uv-value">wartet auf Wert</div>
            </div>
            <div class="sensor-box">
                <div class="sensor-title">Druck</div>
                <div class="sensor-value" id="druck-value">wartet auf Wert</div>
            </div>
            <div class="sensor-box">
                <div class="sensor-title">Temperatur</div>
                <div class="sensor-value" id="temp-value">wartet auf Wert</div>
            </div>
            <div class="sensor-box">
                <div class="sensor-title">Luftfeuchtigkeit</div>
                <div class="sensor-value" id="lf-value">wartet auf Wert</div>
            </div>
        </div>
    </div>

    <div class="card status-box" id="socket-status">
        Server Status: verbindet...
    </div>

    <div class="card status-box">
        Letztes Update: <span id="last-update">noch keines</span>
    </div>

    <div class="card">
        <div class="title">Seiten</div>
        <div class="bottom-buttons">
            <button onclick="window.location.href='/admin'">PC Ansicht</button>
            <button onclick="window.location.href='/live-sign'">Live Schild</button>
            <button onclick="window.location.href='/logout'">Zurück zu Login</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/shared_socket.js') }}"></script>
<script src="{{ url_for('static', filename='js/admin_mobile.js') }}"></script>
</body>
</html>
