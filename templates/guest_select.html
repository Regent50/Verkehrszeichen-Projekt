<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gast Auswahl</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(#111 1px, transparent 1px),
                linear-gradient(135deg, #ffe600, #ff5e00);
            background-size: 14px 14px, 100% 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .box {
            width: 100%;
            max-width: 460px;
            background: white;
            border: 4px solid black;
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 30px;
        }
        p {
            margin-bottom: 22px;
            color: #444;
            font-size: 15px;
        }
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .choice {
            display: block;
            text-decoration: none;
            color: black;
            background: #fafafa;
            border: 3px solid black;
            border-radius: 18px;
            padding: 18px 12px;
            transition: 0.2s;
        }
        .choice:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        .icon {
            font-size: 30px;
            display: block;
            margin-bottom: 8px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
        }
        .desc {
            margin-top: 6px;
            font-size: 13px;
            color: #555;
        }
        .back-btn {
            display: block;
            margin-top: 18px;
            width: 100%;
            padding: 13px;
            background: white;
            color: black;
            border: 3px solid black;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            box-sizing: border-box;
        }
        .back-btn:hover { background: #f2f2f2; }
        @media (max-width: 420px) {
            .choice-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Gastzugang</h1>
        <p>Wähle die Ansicht für dein Gerät</p>
        <div class="choice-grid">
            <a href="/guest-desktop" class="choice">
                <span class="icon">🖥️</span>
                <div class="title">PC Ansicht</div>
                <div class="desc">größere Darstellung für Desktop</div>
            </a>
            <a href="/guest-mobile" class="choice">
                <span class="icon">📱</span>
                <div class="title">Handy Ansicht</div>
                <div class="desc">kompakte Ansicht für Smartphone</div>
            </a>
        </div>
        <a href="/" class="back-btn">Zurück zu Login</a>
    </div>
</body>
</html>
