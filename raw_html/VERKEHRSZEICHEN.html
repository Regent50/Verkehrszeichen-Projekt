<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkehrszeichen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
            user-select: none;
            color: white;
        }
        .bar {
            background-color: #001f3f;
            color: white;
            padding: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .content {
            padding: 10px;
            flex-grow: 1;
            min-height: 800px;
            display: flex;
            justify-content: center; /* Zentriert das Bild horizontal */
            align-items: center; /* Zentriert das Bild vertikal */
            flex-direction: column; /* Damit Text und Bild untereinander stehen */
        }
        .bottom-bar {
            background-color: #001f3f;
            color: white;
            padding: 60px;
            text-align: center;
        }
        #signText {
            color: black; /* Textfarbe auf schwarz setzen */
        }
        #signImage {
            display: none;
            width: 200px;
            height: auto;
            margin-top: 20px; /* Abstand zum Text */
        }
    </style>
    <script>
        var socket = io();

        socket.on("update_sign", function(data) {
            console.log("Neues Verkehrszeichen:", data.sign);
            var textDisplay = document.getElementById("signText");
            var imageDisplay = document.getElementById("signImage");

            textDisplay.innerText = data.sign;

            var signImages = {
                "STOP": "/static/signs/stop_schild.png",
                "Geschwindigkeit 50": "/static/signs/50kmh_schild.png",
                "Achtung Baustelle": "/static/signs/baustelle_schild.png",
                "Freie Fahrt": "/static/signs/freifahrt_schild.png"
            };

            if (signImages[data.sign]) {
                imageDisplay.src = signImages[data.sign];
                imageDisplay.style.display = "block"; /* Bild anzeigen */
            } else {
                imageDisplay.style.display = "none"; /* Bild ausblenden */
            }
        });
    </script>
</head>
<body>
    <div class="bar">
        <h1 style="margin: 0; font-size: 24px;">Verkehrszeichen</h1>
    </div>
    <div class="content">
        <div id="signText">Kein Verkehrszeichen</div>
        <img id="signImage" src="" alt="Verkehrszeichen">
    </div>
    <div class="bottom-bar">
        &copy; 2025 Konrad Solecki | Cezar-Andrei Iosif-Petrescu | David Jovanovic
    </div>
</body>
</html>
